<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Elev</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            min-height: 100vh;
            background: #0b0f1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .profile-page {
            width: 100%;
            max-width: 460px;
        }

        .profile-card {
            background: #11172a;
            border: 1px solid rgba(124, 92, 255, 0.25);
            border-radius: 24px;
            padding: 34px 30px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
        }

        .profile-card h1 {
            margin-bottom: 8px;
            color: #7c5cff;
            font-size: 30px;
        }

        .profile-card p {
            margin-bottom: 28px;
            color: #aaa;
            line-height: 1.7;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #1a1f35;
            background: #0b0f1a;
            color: #fff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input:focus {
            border-color: #4cc9f0;
            box-shadow: 0 0 0 4px rgba(76, 201, 240, 0.14);
        }

        .button-group {
            display: grid;
            gap: 12px;
            margin-top: 8px;
        }

        .button-group button {
            border: none;
            border-radius: 14px;
            padding: 14px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .button-group button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .button-primary {
            background: linear-gradient(90deg, #7c5cff, #4cc9f0);
            color: #fff;
        }

        .button-secondary {
            background: transparent;
            border: 1px solid #4cc9f0;
            color: #4cc9f0;
        }

        .mode-toggle {
            display: inline-block;
            background: transparent;
            color: #7c5cff;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-left: 6px;
        }

        .register-only { display: none; }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #7c5cff;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="profile-page">
        <a class="back-link" href="../index.html">← Înapoi la dashboard</a>
        <div class="profile-card">
            <h1>Profil Elev</h1>
            <p>Autentifică-te pentru a accesa progresul și setările tale personale.</p>
            <form id="authForm" action="/auth-endpoint" method="POST">
                <div class="form-group">
                    <label for="username">Nume de utilizator</label>
                    <input type="text" id="username" name="username" placeholder="Introduceți numele de utilizator" required>
                </div>
                <div class="form-group">
                    <label for="password">Parolă</label>
                    <input type="password" id="password" name="password" placeholder="Introduceți parola" required>
                </div>
                <div class="form-group register-only">
                    <label for="confirmPassword">Confirmă parola</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmă parola">
                </div>
                <div class="button-group">
                    <button type="submit" id="submitBtn" name="action" value="login" class="button-primary">Loghează-te</button>
                    <div style="text-align:center">
                        <button type="button" id="toggleMode" class="mode-toggle">Creează cont nou</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
    <script>
        (function(){
            const toggle = document.getElementById('toggleMode');
            const registerOnly = document.querySelectorAll('.register-only');
            const submitBtn = document.getElementById('submitBtn');
            const heading = document.querySelector('.profile-card h1');
            const parag = document.querySelector('.profile-card p');
            let mode = 'login';
            function setMode(m){
                mode = m;
                if(mode==='login'){
                    heading.textContent = 'Profil Elev';
                    parag.textContent = 'Autentifică-te pentru a accesa progresul și setările tale personale.';
                    submitBtn.textContent = 'Loghează-te';
                    submitBtn.value = 'login';
                    registerOnly.forEach(el=>el.style.display='none');
                    document.getElementById('confirmPassword').required = false;
                    toggle.textContent = 'Creează cont nou';
                } else {
                    heading.textContent = 'Creează cont';
                    parag.textContent = 'Completează formularul pentru a crea un cont nou.';
                    submitBtn.textContent = 'Înregistrează-te';
                    submitBtn.value = 'register';
                    registerOnly.forEach(el=>el.style.display='block');
                    document.getElementById('confirmPassword').required = true;
                    toggle.textContent = 'Am deja cont';
                }
            }
            toggle.addEventListener('click', ()=> setMode(mode==='login' ? 'register' : 'login'));
            setMode('login');
            document.getElementById('authForm').addEventListener('submit', function(e){
                if(submitBtn.value==='register'){
                    const pw = document.getElementById('password').value;
                    const cpw = document.getElementById('confirmPassword').value;
                    if(pw !== cpw){
                        e.preventDefault();
                        alert('Parolele nu se potrivesc.');
                    }
                }
            });
        })();
    </script>
</html>
