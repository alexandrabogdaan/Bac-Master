<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Elev</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .profile-page {
            width: 100%;
            max-width: 460px;
        }

        .profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 34px 30px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .profile-card h1 {
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 30px;
        }

        .profile-card p {
            margin-bottom: 28px;
            color: var(--muted);
            line-height: 1.7;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.25s ease, color 0.25s ease;
        }

        .form-group input::placeholder {
            color: var(--muted);
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.16);
        }

        .button-group {
            display: grid;
            gap: 12px;
            margin-top: 8px;
        }

        .button-group button {
            border: none;
            border-radius: 14px;
            padding: 14px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .button-group button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .button-primary {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #fff;
        }

        .button-secondary {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .mode-toggle {
            display: inline-block;
            background: transparent;
            color: var(--primary);
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-left: 6px;
        }

        .register-only { display: none; }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <script src="../js/theme.js"></script>
    <div class="profile-page">
        <a class="back-link" href="../index.html">← Înapoi la dashboard</a>
        <div class="profile-card">
            <h1>Profil Elev</h1>
            <p>Autentifică-te pentru a accesa progresul și setările tale personale.</p>
            <form id="authForm" action="auth.php" method="POST">
                <div class="form-group">
                    <label for="username">Nume de utilizator</label>
                    <input type="text" id="username" name="username" placeholder="Introduceți numele de utilizator" required>
                </div>
                <div class="form-group">
                    <label for="password">Parolă</label>
                    <input type="password" id="password" name="password" placeholder="Introduceți parola" required>
                </div>
                <div class="form-group register-only">
                    <label for="confirmPassword">Confirmă parola</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmă parola">
                </div>
                <div class="button-group">
                    <button type="submit" id="submitBtn" name="action" value="login" class="button-primary">Loghează-te</button>
                    <div style="text-align:center">
                        <button type="button" id="toggleMode" class="mode-toggle">Creează cont nou</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
