<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creare cont - BAC Master</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .profile-page {
            width: 100%;
            max-width: 460px;
        }

        .profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 34px 30px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .profile-card h1 {
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 30px;
        }

        .profile-card p {
            margin-bottom: 28px;
            color: var(--muted);
            line-height: 1.7;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.25s ease, color 0.25s ease;
        }

        .form-group input::placeholder {
            color: var(--muted);
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.16);
        }

        .button-group {
            display: grid;
            gap: 12px;
            margin-top: 8px;
        }

        .button-group button,
        .button-group a {
            border: none;
            border-radius: 14px;
            padding: 14px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .button-group button:hover,
        .button-group a:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .button-primary {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #fff;
        }

        .button-secondary {
            background: transparent;
            border: 1px solid var(--primary) !important;
            color: var(--primary);
        }

        .switch-line {
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }

        .switch-line a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .switch-line a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .form-error {
            display: none;
            background: #fdeaea;
            color: #b32424;
            border: 1px solid #f3bcbc;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <script src="../js/theme.js"></script>
    <div class="profile-page">
        <a class="back-link" href="../index.html">← Înapoi la dashboard</a>
        <div class="profile-card">
            <h1>Creează cont nou</h1>
            <p>Creează-ți un cont pentru a-ți salva progresul și a-ți personaliza setările.</p>

            <div class="form-error" id="registerError">Numele de utilizator este deja luat.</div>

            <form id="registerForm" action="../php/auth.php" method="POST">
                <div class="form-group">
                    <label for="username">Nume de utilizator</label>
                    <input type="text" id="username" name="username" placeholder="Alege un nume de utilizator" required>
                </div>
                <div class="form-group">
                    <label for="password">Parolă</label>
                    <input type="password" id="password" name="password" placeholder="Alege o parolă" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmă parola</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmă parola" required>
                </div>
                <div class="button-group">
                    <button type="submit" name="action" value="register" class="button-primary">Creează cont</button>
                    <p class="switch-line">Ai deja cont? <a href="login.html">Loghează-te</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/app.js"></script>
    <script>
        var form = document.getElementById('registerForm');
        form.addEventListener('submit', function (e) {
            var pass = document.getElementById('password').value;
            var confirm = document.getElementById('confirmPassword').value;
            if (pass !== confirm) {
                e.preventDefault();
                var err = document.getElementById('registerError');
                err.textContent = 'Parolele nu se potrivesc.';
                err.style.display = 'block';
            }
        });

        var params = new URLSearchParams(window.location.search);
        var eroare = params.get('eroare');
        if (eroare) {
            var err = document.getElementById('registerError');
            if (eroare === 'user_exists') {
                err.textContent = 'Username deja existent.';
            } else if (eroare === 'match') {
                err.textContent = 'Parolele nu se potrivesc.';
            } else {
                err.textContent = 'A apărut o eroare. Încearcă din nou.';
            }
            err.style.display = 'block';
        }
    </script>
</body>
</html>
