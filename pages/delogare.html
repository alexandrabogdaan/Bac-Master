<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deconectare - BAC Master</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .profile-page {
            width: 100%;
            max-width: 460px;
        }

        .profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 34px 30px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
            text-align: center;
        }

        .profile-card h1 {
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 30px;
        }

        .profile-card p {
            margin-bottom: 28px;
            color: var(--muted);
            line-height: 1.7;
        }

        .button-group {
            display: grid;
            gap: 12px;
            margin-top: 8px;
        }

        .button-group a {
            border: none;
            border-radius: 14px;
            padding: 14px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .button-group a:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .button-primary {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #fff;
        }

        .button-secondary {
            background: transparent;
            border: 1px solid var(--primary) !important;
            color: var(--primary);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <script src="../js/theme.js"></script>
    <div class="profile-page">
        <a class="back-link" href="../index.html">← Înapoi la dashboard</a>
        <div class="profile-card" id="logoutCard">
            <h1>👋 Deconectare</h1>
            <p id="logoutText">Ești sigur că vrei să te deloghezi?</p>
            <div class="button-group">
                <a href="../php/logout.php" class="button-primary">Da, deloghează-mă</a>
                <a href="../index.html" class="button-secondary">Nu, rămân conectat</a>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
    <script>
        // Dacă nu ești de fapt logat (ai ajuns direct pe pagina asta), afișăm alt mesaj
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        const username = getCookie('username');
        if (username) {
            document.getElementById('logoutText').textContent =
                'Ești sigur că vrei să te deloghezi, ' + decodeURIComponent(username) + '?';
        } else {
            document.getElementById('logoutCard').innerHTML =
                '<h1>Nu ești autentificat</h1>' +
                '<p>Nu ai niciun cont conectat momentan.</p>' +
                '<div class="button-group">' +
                '  <a href="login.html" class="button-primary">Loghează-te</a>' +
                '</div>';
        }
    </script>
</body>
</html>
